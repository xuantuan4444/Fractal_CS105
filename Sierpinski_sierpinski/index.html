<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sierpinski Fractal | WebGL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 22px;
            border: 2px solid #444;
            background: transparent;
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.25s ease;
        }

        .btn:hover {
            border-color: #7b2ff7;
            color: #fff;
        }

        .btn.active {
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            border-color: transparent;
            color: #fff;
            font-weight: 600;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-group label {
            font-size: 0.95em;
            color: #aaa;
        }

        input[type="range"] {
            width: 160px;
            accent-color: #7b2ff7;
        }

        #depthValue {
            font-weight: bold;
            font-size: 1.1em;
            color: #00d2ff;
            min-width: 22px;
        }

        select {
            padding: 7px 14px;
            border: 2px solid #444;
            background: #1a1a2e;
            color: #ccc;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            transition: border-color 0.25s;
        }

        select:hover {
            border-color: #7b2ff7;
        }

        .info {
            font-size: 0.88em;
            color: #666;
            margin-bottom: 10px;
            min-height: 1.2em;
        }

        canvas {
            border: 1px solid #1e1e3a;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            background: #060612;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sierpinski Fractal</h1>

        <div class="controls">
            <button class="btn active" id="btnTriangle">Triangle</button>
            <button class="btn" id="btnCarpet">Carpet</button>

            <div class="slider-group">
                <label>Depth:</label>
                <input type="range" id="depthSlider" min="0" max="8" value="4">
                <span id="depthValue">4</span>
            </div>

            <select id="colorScheme">
                <option value="rainbow">Rainbow</option>
                <option value="cool">Cool</option>
                <option value="warm">Warm</option>
                <option value="neon">Neon</option>
            </select>
        </div>

        <div class="info" id="info"></div>

        <canvas id="glCanvas" width="700" height="700"></canvas>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
