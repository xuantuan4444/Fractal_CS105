<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal WebGL Koch & Minkowski Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h2>Khám phá Fractal</h2>
        
        <div id="controls">
            <label for="fractalType">Thuật toán:</label>
            <select id="fractalType">
                <option value="koch">Bông tuyết Koch</option>
                <option value="minkowski">Đảo Minkowski</option>
            </select>
            <button id="restartBtn">Chạy lại hoạt ảnh</button>
        </div>
        
        <hr style="border: 0.5px solid #444; margin: 15px 0;">
        
        <p>Cấp độ: <span id="levelTitle" style="color: #ffcc00; font-weight: bold;">Đang tải...</span></p>
        <div id="hint">
            <p id="levelNote" style="font-size: 0.85em; color: #00d4ff; margin-top: 15px; line-height: 1.4;">
                </p>
        </div>
    </div>

    <canvas id="glCanvas"></canvas>
    
    <script src="main.js"></script>
</body>
</html>
